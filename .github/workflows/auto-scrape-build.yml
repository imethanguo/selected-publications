name: Auto Scrape And Build

on:
  schedule:
    # Every day at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-scrape-build
  cancel-in-progress: false

jobs:
  scrape-build-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install scraper dependencies
        working-directory: dblp-publications-scraper
        run: |
          chmod +x ./sp
          ./sp i

      - name: Run scraper
        working-directory: dblp-publications-scraper
        env:
          # Recommended: set this in repository Settings -> Secrets and variables -> Actions
          VENUE_SHORT_LLM_API_KEY: ${{ secrets.VENUE_SHORT_LLM_API_KEY }}
        run: ./sp

      - name: Install Node dependencies
        run: npm ci

      - name: Build bundle
        run: npm run build

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "No staged changes to commit."
            exit 0
          fi

          git commit -m "chore: auto update publications and bundle"
          git push
